version: '3.8'

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama_start.sh:/usr/local/bin/ollama_start.sh
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/bin/ollama_start.sh"]

  mcp-server:
    build: ./mcp-server-project
    container_name: mcp-server
    ports:
      - "3000:3000"
    environment:
      - MCP_PORT=3000
    restart: unless-stopped
    networks:
      - bot_network

  discord-bot:
    build: ./discord-bot-project
    container_name: discord-bot
    depends_on:
      - mcp-server
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME}
      - MCP_SERVER_URL=http://mcp-server:3000/mcp
      - SQLITE_DB_PATH=/data/active_channels.db # Point to the mounted volume
    volumes:
      - discord_bot_data:/data # Mount the volume to /data inside the container
    restart: unless-stopped
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  ollama_data:
  discord_bot_data: # New named volume for Discord bot data