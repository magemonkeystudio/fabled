services:
  mcp-server:
    build: ./mcp-server-project
    container_name: mcp-server
    ports:
      - "3000:3000"
    environment:
      - MCP_PORT=3000
    healthcheck: # Add healthcheck for mcp-server
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3s # Give it time to start up
    restart: unless-stopped
    networks:
      - bot_network

  discord-bot:
    build: ./discord-bot-project
    container_name: discord-bot
    depends_on:
      mcp-server:
        condition: service_healthy # Depend on mcp-server being healthy
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME}
      - MCP_SERVER_URL=http://mcp-server:3000/mcp
      - SQLITE_DB_PATH=/data/active_channels.db
    volumes:
      - discord_bot_data:/data
    healthcheck: # Add healthcheck for discord-bot (simple check)
      test: ["CMD-SHELL", "pgrep node || exit 1"] # Check if node process is running
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  discord_bot_data: